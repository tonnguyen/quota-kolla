name: Build Release Artifacts

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macos
          - os: windows-latest
            name: windows

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri bundles for release tags
        if: startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Quota kolla ${{ github.ref_name }}'
          releaseBody: 'Automated build artifacts for Quota kolla.'
          releaseDraft: true
          prerelease: false
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: '[platform]-[arch]-[bundle]'

      - name: Build Tauri bundles for branch pushes
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: tauri-apps/tauri-action@v1
        with:
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: '[platform]-[arch]-[bundle]'
