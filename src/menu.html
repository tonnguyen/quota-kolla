<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usage Menu</title>
  <link rel="stylesheet" href="menu.css">
</head>
<body>
  <div class="dropdown">
    <div class="providers" id="providers">
      <!-- Provider sections will be rendered here -->
    </div>

    <div class="separator"></div>

    <div class="menu-item" data-action="preferences">
      <span class="menu-item-label">Preferences...</span>
      <span class="menu-item-shortcut">⌘,</span>
    </div>

    <div class="menu-item" data-action="quit">
      <span class="menu-item-label">Quit</span>
      <span class="menu-item-shortcut">⌘Q</span>
    </div>
  </div>

  <script src="menu.js"></script>
</body>
</html>
